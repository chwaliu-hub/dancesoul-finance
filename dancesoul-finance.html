<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈動力肢體開發有限公司 — 財務管理系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1612;
    --paper: #f7f3ee;
    --paper2: #efe9e0;
    --accent: #c8451a;
    --accent2: #e8a020;
    --studio: #2d5a3d;
    --studio-light: #e8f2eb;
    --perf: #1a3a5c;
    --perf-light: #e4edf7;
    --bonsei: #5c2d7a;
    --bonsei-light: #f0e8f7;
    --border: #d4c9b8;
    --muted: #8a7d6e;
    --positive: #2d7a45;
    --negative: #c8451a;
    --shadow: 0 2px 12px rgba(26,22,18,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }
  .header-title h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .header-title p {
    font-size: 11px;
    color: var(--paper2);
    margin-top: 3px;
    letter-spacing: 0.15em;
    font-family: 'DM Mono', monospace;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .period-selector {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .period-selector select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--paper);
    padding: 6px 10px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  .period-selector select option { background: var(--ink); }

  /* ── NAV TABS ── */
  nav {
    background: var(--ink);
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tab-btn {
    padding: 12px 20px;
    background: none;
    border: none;
    color: rgba(247,243,238,0.5);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--paper); }
  .tab-btn.active {
    color: var(--paper);
    border-bottom-color: var(--accent);
  }
  .tab-btn.tab-studio.active { border-bottom-color: #5cb87a; }
  .tab-btn.tab-perf.active { border-bottom-color: #5a9fd4; }
  .tab-btn.tab-bonsei.active { border-bottom-color: #a87fd4; }
  .tab-btn.tab-summary.active { border-bottom-color: var(--accent2); }

  /* ── MAIN ── */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* ── ENTITY HEADER ── */
  .entity-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .entity-badge {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .entity-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .entity-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
  }
  .entity-actions { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 5px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a33515; }
  .btn-secondary { background: var(--paper2); color: var(--ink); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--ink); background: var(--paper2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-export { background: var(--ink); color: var(--paper); }
  .btn-export:hover { background: #333; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
  }
  .stat-value.positive { color: var(--positive); }
  .stat-value.negative { color: var(--negative); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── TWO COLUMN LAYOUT ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

  /* ── PANEL ── */
  .panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper2);
  }
  .panel-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .panel-body { padding: 16px 20px; }

  /* ── QUICK ENTRY ── */
  .quick-entry {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
  }
  .quick-entry label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .quick-entry input, .quick-entry select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--ink);
    width: 100%;
  }
  .quick-entry input:focus, .quick-entry select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .entry-row2 {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    padding: 0 20px 16px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    align-items: end;
  }
  .entry-row2 input, .entry-row2 select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 13px;
    width: 100%;
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 12px; color: var(--muted); }

  /* ── LEDGER TABLE ── */
  .ledger-table { width: 100%; border-collapse: collapse; }
  .ledger-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    background: var(--paper2);
  }
  .ledger-table td {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--paper2);
    vertical-align: middle;
  }
  .ledger-table tr:hover td { background: var(--paper); }
  .ledger-table tr:last-child td { border-bottom: none; }
  .amount-income { color: var(--positive); font-family: 'DM Mono', monospace; }
  .amount-expense { color: var(--negative); font-family: 'DM Mono', monospace; }
  .cat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    background: var(--paper2);
    color: var(--muted);
  }
  .note-text { color: var(--muted); font-size: 12px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delete-btn {
    background: none; border: none; color: var(--border);
    cursor: pointer; font-size: 14px; padding: 2px 6px;
    border-radius: 3px; transition: all 0.15s;
  }
  .delete-btn:hover { color: var(--negative); background: #fee; }

  /* ── P&L TABLE ── */
  .pl-table { width: 100%; border-collapse: collapse; }
  .pl-table td, .pl-table th {
    padding: 9px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--paper2);
  }
  .pl-table .section-header td {
    background: var(--paper2);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .pl-table .sub-row td:first-child { padding-left: 32px; color: var(--ink); }
  .pl-table .total-row td {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    border-top: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    background: var(--paper);
  }
  .pl-table .profit-row td {
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    background: var(--ink);
    color: var(--paper);
    border: none;
  }
  .num-col { text-align: right; font-family: 'DM Mono', monospace; }

  /* ── SUMMARY SECTION ── */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
  .summary-entity-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .sec-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-header .dot { width: 10px; height: 10px; border-radius: 50%; }
  .sec-header .name { font-size: 14px; font-weight: 600; }
  .sec-body { padding: 14px 18px; }
  .sec-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .sec-row:last-child { margin-bottom: 0; }
  .sec-divider { height: 1px; background: var(--border); margin: 10px 0; }
  .sec-net { font-weight: 700; font-family: 'DM Mono', monospace; }

  /* ── MONTH BATCH ENTRY ── */
  .batch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .batch-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    gap: 12px;
  }
  .batch-label { font-size: 13px; flex: 1; }
  .batch-input {
    width: 120px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: right;
  }
  .batch-input:focus { outline: none; border-color: var(--accent); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 10px;
    width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: white;
  }
  .modal-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  .modal-body { padding: 24px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .form-row textarea { resize: vertical; min-height: 72px; }
  .form-two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .radio-group { display: flex; gap: 16px; }
  .radio-group label {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: var(--ink); cursor: pointer;
  }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: var(--paper);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  /* ── SCROLLABLE TABLE WRAPPER ── */
  .table-wrap { max-height: 420px; overflow-y: auto; }
  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--paper); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
  }

  .tag-income { background: #e8f5ee; color: var(--positive); }
  .tag-expense { background: #fdecea; color: var(--negative); }

  .year-month-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .filter-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 12px;
    background: white;
  }
  .filter-label { font-size: 12px; color: var(--muted); }

  /* ── CATEGORY MANAGER ── */
  .cat-manager-entity {
    margin-bottom: 28px;
  }
  .cat-manager-entity-title {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px;
    padding-bottom: 10px;
    margin-bottom: 14px;
    border-bottom: 2px solid var(--border);
  }
  .cat-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .cat-col-title {
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
  }
  .cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .cat-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 13px;
  }
  .cat-list-item .cat-del {
    background: none; border: none; color: var(--border);
    cursor: pointer; font-size: 13px; padding: 0 4px;
    border-radius: 3px; transition: all 0.15s; line-height: 1;
  }
  .cat-list-item .cat-del:hover { color: var(--negative); background: #fee; }
  .cat-add-row {
    display: flex; gap: 6px;
  }
  .cat-add-row input {
    flex: 1; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 5px;
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
  }
  .cat-add-row input:focus { outline: none; border-color: var(--accent); }
  .cat-add-btn {
    padding: 6px 12px; background: var(--ink); color: white;
    border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
    white-space: nowrap;
  }
  .cat-add-btn:hover { background: #333; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">
    <h1>靈動力肢體開發有限公司</h1>
    <p>FINANCIAL MANAGEMENT SYSTEM · v1.8</p>
  </div>
  <div class="header-right">
    <div class="period-selector">
      <select id="yearSel" onchange="onPeriodChange()"></select>
      <select id="monthSel" onchange="onPeriodChange()">
        <option value="0">全年</option>
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3">3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <button class="btn btn-export" onclick="exportExcel()">⬇ 匯出 Excel</button>
  </div>
</header>

<!-- NAV -->
<nav>
  <button class="tab-btn tab-summary active" onclick="showTab('summary')">📊 總覽</button>
  <button class="tab-btn tab-studio" onclick="showTab('studio')">🏠 舞蹈教室</button>
  <button class="tab-btn tab-perf" onclick="showTab('perf')">🎭 舞蹈活動演出</button>
  <button class="tab-btn tab-bonsei" onclick="showTab('bonsei')">✦ 本勢</button>
  <button class="tab-btn tab-settings" onclick="showTab('settings')" style="margin-left:auto">⚙ 科目設定</button>
</nav>

<main>

<!-- ═══ SUMMARY TAB ═══ -->
<div id="tab-summary" class="section active">
  <div class="entity-header">
    <div class="entity-badge">
      <div class="entity-dot" style="background:var(--accent2)"></div>
      <div class="entity-name">三業態總覽</div>
    </div>
    <div class="toolbar">
      <button class="btn btn-secondary btn-sm" onclick="openBatchModal()">📅 月度批次輸入</button>
    </div>
  </div>

  <!-- 總覽 Stats -->
  <div class="stats-row" id="summaryStats"></div>

  <!-- 三業態卡片 -->
  <div class="summary-grid" id="summaryCards"></div>

  <!-- 總損益表 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">合併損益表</span>
    </div>
    <div class="panel-body" style="padding:0">
      <table class="pl-table" id="summaryPL"></table>
    </div>
  </div>
</div>

<!-- ═══ STUDIO TAB ═══ -->
<div id="tab-studio" class="section">
  <div class="entity-header">
    <div class="entity-badge">
      <div class="entity-dot" style="background:var(--studio)"></div>
      <div class="entity-name">舞蹈教室</div>
    </div>
    <div class="entity-actions">
      <button class="btn btn-primary" onclick="openAddModal('studio')">＋ 新增記錄</button>
    </div>
  </div>
  <div class="stats-row" id="studioStats"></div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">損益表</span></div>
      <div style="padding:0"><table class="pl-table" id="studioPL"></table></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">收支明細</span>
        <div class="toolbar">
          <select onchange="filterType('studio', this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;">
            <option value="">全部</option>
            <option value="income">收入</option>
            <option value="expense">支出</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table class="ledger-table">
          <thead><tr>
            <th>日期</th><th>類別</th><th>金額</th><th>備註</th><th></th>
          </tr></thead>
          <tbody id="studioLedger"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PERF TAB ═══ -->
<div id="tab-perf" class="section">
  <div class="entity-header">
    <div class="entity-badge">
      <div class="entity-dot" style="background:var(--perf)"></div>
      <div class="entity-name">舞蹈活動演出</div>
    </div>
    <div class="entity-actions">
      <button class="btn btn-primary" onclick="openAddModal('perf')">＋ 新增記錄</button>
    </div>
  </div>
  <div class="stats-row" id="perfStats"></div>
  <div class="two-col">

<script>
// ══════════════════════════════════════════
// DATA SCHEMA
// ══════════════════════════════════════════
const DEFAULT_CATEGORIES = {
  studio: {
    income: ['學費／月費', '體驗課收入', '場地租借', '師資外聘費', '其他收入'],
    expense: ['薪資', '場租', '水電費', '行銷費用', '教材耗材', '保險', '雜支']
  },
  perf: {
    income: ['演出費', '活動執行費', '廠商合作費', '廣告置入', '其他收入'],
    expense: ['舞者費用', '製作費', '交通費', '道具服裝', '行銷費用', '薪資', '雜支']
  },
  bonsei: {
    income: ['品牌合作', '授權金', '顧問費', '演出費', '其他收入'],
    expense: ['製作費', '行銷費用', '薪資', '版稅支出', '雜支']
  }
};

// 科目快取（從 Google Sheets 載入）
let _catCache = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));

function getCategories() { return _catCache; }

async function loadCategoriesFromSheet() {
  try {
    const url = `${SCRIPT_URL}?action=getCategories`;
    const res = await fetch(url);
    const json = await res.json();
    // 如果 Sheets 裡有資料就用，否則用預設值
    if (json && Object.keys(json).length > 0) {
      // 補齊缺少的業態
      ['studio','perf','bonsei'].forEach(e => {
        if (!json[e]) json[e] = DEFAULT_CATEGORIES[e];
        if (!json[e].income) json[e].income = DEFAULT_CATEGORIES[e].income;
        if (!json[e].expense) json[e].expense = DEFAULT_CATEGORIES[e].expense;
      });
      _catCache = json;
    }
  } catch(e) {
    console.warn('科目載入失敗，使用預設值', e);
  }
}

async function saveCategoriesToSheet(cats) {
  _catCache = cats;
  try {
    const url = `${SCRIPT_URL}?action=saveCategories&data=${encodeURIComponent(JSON.stringify(cats))}`;
    await fetch(url);
  } catch(e) {
    showToast('⚠ 科目儲存失敗', 'error');
  }
}

// 相容舊程式碼
let CATEGORIES = _catCache;

const ENTITY_META = {
  studio: { name: '舞蹈教室', color: '#2d5a3d', light: '#e8f2eb' },
  perf:   { name: '舞蹈活動演出', color: '#1a3a5c', light: '#e4edf7' },
  bonsei: { name: '本勢', color: '#5c2d7a', light: '#f0e8f7' }
};

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiqYSUUv0mBr5lYLVFwKhLmvEkjubAo2_xNYaPjLHkp6b9dwqjFnOlTXS_-OgoeJp3cA/exec';

// ── 本地快取，減少 API 呼叫 ──
let _cache = { studio: null, perf: null, bonsei: null };
let _loading = false;

async function fetchEntity(entity) {
  const url = `${SCRIPT_URL}?action=getAll&entity=${entity}`;
  const res = await fetch(url);
  const json = await res.json();
  return (json.data || []).map(row => ({
    id: String(row.id),
    date: row.date,
    type: row.type,
    amount: parseFloat(row.amount) || 0,
    cat: row.cat,
    note: row.note || ''
  }));
}

async function loadAllData() {
  showLoading(true);
  try {
    const [studio, perf, bonsei] = await Promise.all([
      fetchEntity('studio'),
      fetchEntity('perf'),
      fetchEntity('bonsei')
    ]);
    _cache = { studio, perf, bonsei };
    await loadCategoriesFromSheet();
    CATEGORIES = _catCache;
  } catch(e) {
    console.error('載入失敗', e);
    showToast('⚠ 資料載入失敗，請檢查網路連線', 'error');
  }
  showLoading(false);
}

async function apiAdd(entity, entry) {
  const url = `${SCRIPT_URL}?action=add&entity=${entity}&data=${encodeURIComponent(JSON.stringify(entry))}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '新增失敗');
  // 更新快取
  _cache[entity].push(entry);
}

async function apiDelete(entity, id) {
  const url = `${SCRIPT_URL}?action=delete&entity=${entity}&id=${encodeURIComponent(id)}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '刪除失敗');
  // 更新快取
  _cache[entity] = _cache[entity].filter(e => e.id !== id);
}

function getData() { return _cache; }

// State
let currentEntity = null;
let filterTypes = { studio: '', perf: '', bonsei: '' };
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;

function showLoading(on) {
  let el = document.getElementById('loadingBar');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingBar';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:999;transition:opacity 0.3s';
    document.body.appendChild(el);
  }
  el.style.opacity = on ? '1' : '0';
}

function showToast(msg, type='info') {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:6px;font-size:13px;z-index:999;transition:opacity 0.3s;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = type === 'error' ? '#c8451a' : '#1a1612';
  el.style.color = '#f7f3ee';
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 3000);
}

// ══════════════════════════════════════════
// PERIOD FILTER
// ══════════════════════════════════════════
function initPeriodSelectors() {
  const yearSel = document.getElementById('yearSel');
  const now = new Date().getFullYear();
  for (let y = now - 3; y <= now + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if (y === now) o.selected = true;
    yearSel.appendChild(o);
  }
  document.getElementById('monthSel').value = currentMonth;
}

function onPeriodChange() {
  currentYear = parseInt(document.getElementById('yearSel').value);
  currentMonth = parseInt(document.getElementById('monthSel').value);
  renderAll();
}

function filterByPeriod(entries) {
  return entries.filter(e => {
    const d = new Date(e.date);
    if (d.getFullYear() !== currentYear) return false;
    if (currentMonth === 0) return true;
    return d.getMonth() + 1 === currentMonth;
  });
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector('.tab-btn.tab-' + tab).classList.add('active');
  if (tab === 'settings') renderCatManager();
  else renderAll();
}

// ══════════════════════════════════════════
// CALCULATIONS
// ══════════════════════════════════════════
function calcEntity(entity) {
  const data = getData();
  const entries = filterByPeriod(data[entity] || []);
  const income = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const expense = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  const net = income - expense;

  const cats = getCategories();
  // by category
  const incByCat = {}, expByCat = {};
  (cats[entity]?.income || []).forEach(c => incByCat[c] = 0);
  (cats[entity]?.expense || []).forEach(c => expByCat[c] = 0);
  entries.forEach(e => {
    if (e.type === 'income') incByCat[e.cat] = (incByCat[e.cat] || 0) + e.amount;
    else expByCat[e.cat] = (expByCat[e.cat] || 0) + e.amount;
  });

  return { income, expense, net, incByCat, expByCat, entries };
}

// ══════════════════════════════════════════
// FORMAT
// ══════════════════════════════════════════
function fmt(n) {
  return (n >= 0 ? '' : '-') + 'NT$' + Math.abs(n).toLocaleString('zh-TW');
}
function fmtAbs(n) { return 'NT$' + Math.abs(n).toLocaleString('zh-TW'); }

// ══════════════════════════════════════════
// RENDER STATS ROW
// ══════════════════════════════════════════
function renderStats(id, income, expense, net, count) {
  const el = document.getElementById(id);
  const margin = income > 0 ? ((net / income) * 100).toFixed(1) : '—';
  el.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">總收入</div>
      <div class="stat-value positive">${fmtAbs(income)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">總支出</div>
      <div class="stat-value negative">${fmtAbs(expense)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">淨損益</div>
      <div class="stat-value ${net >= 0 ? 'positive' : 'negative'}">${fmt(net)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">利潤率</div>
      <div class="stat-value ${net >= 0 ? 'positive' : 'negative'}">${margin}%</div>
      <div class="stat-sub">共 ${count} 筆記錄</div>
    </div>
  `;
}

// ══════════════════════════════════════════
// RENDER P&L TABLE
// ══════════════════════════════════════════
function renderPL(tableId, entity, calc) {
  const tbl = document.getElementById(tableId);
  const cats = getCategories();
  let html = '';

  html += `<tr class="section-header"><td colspan="2">收入</td></tr>`;
  (cats[entity]?.income || []).forEach(c => {
    const v = calc.incByCat[c] || 0;
    html += `<tr class="sub-row"><td>${c}</td><td class="num-col">${fmtAbs(v)}</td></tr>`;
  });
  // show any entries with cats not in current list
  Object.entries(calc.incByCat).forEach(([c, v]) => {
    if (!(cats[entity]?.income || []).includes(c) && v > 0)
      html += `<tr class="sub-row"><td>${c} <span style="color:var(--muted);font-size:11px">（已移除科目）</span></td><td class="num-col">${fmtAbs(v)}</td></tr>`;
  });
  html += `<tr class="total-row"><td>收入合計</td><td class="num-col" style="color:var(--positive)">${fmtAbs(calc.income)}</td></tr>`;

  html += `<tr class="section-header"><td colspan="2">支出</td></tr>`;
  (cats[entity]?.expense || []).forEach(c => {
    const v = calc.expByCat[c] || 0;
    html += `<tr class="sub-row"><td>${c}</td><td class="num-col">${fmtAbs(v)}</td></tr>`;
  });
  Object.entries(calc.expByCat).forEach(([c, v]) => {
    if (!(cats[entity]?.expense || []).includes(c) && v > 0)
      html += `<tr class="sub-row"><td>${c} <span style="color:var(--muted);font-size:11px">（已移除科目）</span></td><td class="num-col">${fmtAbs(v)}</td></tr>`;
  });
  html += `<tr class="total-row"><td>支出合計</td><td class="num-col" style="color:var(--negative)">${fmtAbs(calc.expense)}</td></tr>`;

  const netColor = calc.net >= 0 ? '#5cb87a' : '#e87060';
  html += `<tr class="profit-row"><td>淨損益</td><td class="num-col" style="color:${netColor}">${fmt(calc.net)}</td></tr>`;

  tbl.innerHTML = html;
}

// ══════════════════════════════════════════
// RENDER LEDGER
// ══════════════════════════════════════════
function renderLedger(tbodyId, entity, filterType) {
  const data = getData();
  const all = filterByPeriod(data[entity] || []);
  const entries = filterType ? all.filter(e => e.type === filterType) : all;
  const tbody = document.getElementById(tbodyId);

  if (entries.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">📋</div><p>尚無記錄</p></div></td></tr>`;
    return;
  }

  // sort by date desc
  const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
  tbody.innerHTML = sorted.map(e => `
    <tr>
      <td style="font-family:'DM Mono',monospace;font-size:12px;white-space:nowrap">${e.date}</td>
      <td><span class="cat-badge">${e.cat}</span></td>
      <td class="${e.type === 'income' ? 'amount-income' : 'amount-expense'}">
        ${e.type === 'income' ? '+' : '-'}${fmtAbs(e.amount)}
      </td>
      <td><span class="note-text" title="${e.note || ''}">${e.note || '—'}</span></td>
      <td><button class="delete-btn" onclick="deleteEntry('${entity}','${e.id}')">✕</button></td>
    </tr>
  `).join('');
}

// ══════════════════════════════════════════
// RENDER SUMMARY
// ══════════════════════════════════════════
function renderSummary() {
  const calcs = {
    studio: calcEntity('studio'),
    perf: calcEntity('perf'),
    bonsei: calcEntity('bonsei')
  };

  const totalIncome = calcs.studio.income + calcs.perf.income + calcs.bonsei.income;
  const totalExpense = calcs.studio.expense + calcs.perf.expense + calcs.bonsei.expense;
  const totalNet = totalIncome - totalExpense;
  const totalCount = calcs.studio.entries.length + calcs.perf.entries.length + calcs.bonsei.entries.length;

  renderStats('summaryStats', totalIncome, totalExpense, totalNet, totalCount);

  // Entity cards
  const cardsEl = document.getElementById('summaryCards');
  cardsEl.innerHTML = ['studio','perf','bonsei'].map(e => {
    const m = ENTITY_META[e];
    const c = calcs[e];
    return `
      <div class="summary-entity-card">
        <div class="sec-header" style="background:${m.light}">
          <div class="dot" style="background:${m.color}"></div>
          <div class="name">${m.name}</div>
        </div>
        <div class="sec-body">
          <div class="sec-row"><span style="color:var(--muted)">收入</span><span style="color:var(--positive);font-family:'DM Mono',monospace">${fmtAbs(c.income)}</span></div>
          <div class="sec-row"><span style="color:var(--muted)">支出</span><span style="color:var(--negative);font-family:'DM Mono',monospace">${fmtAbs(c.expense)}</span></div>
          <div class="sec-divider"></div>
          <div class="sec-row"><span>淨損益</span><span class="sec-net" style="color:${c.net>=0?'var(--positive)':'var(--negative)'}">${fmt(c.net)}</span></div>
        </div>
      </div>
    `;
  }).join('');

  // Summary P&L
  const tbl = document.getElementById('summaryPL');
  let html = '';
  ['studio','perf','bonsei'].forEach(e => {
    const m = ENTITY_META[e];
    const c = calcs[e];
    html += `<tr><td colspan="2" style="background:${m.light};font-weight:600;font-size:13px;padding:10px 16px;color:${m.color}">${m.name}</td></tr>`;
    html += `<tr class="sub-row"><td>收入</td><td class="num-col" style="color:var(--positive)">${fmtAbs(c.income)}</td></tr>`;
    html += `<tr class="sub-row"><td>支出</td><td class="num-col" style="color:var(--negative)">${fmtAbs(c.expense)}</td></tr>`;
    html += `<tr class="sub-row"><td style="font-weight:600">小計</td><td class="num-col" style="font-weight:600;color:${c.net>=0?'var(--positive)':'var(--negative)'}">${fmt(c.net)}</td></tr>`;
  });
  html += `<tr class="profit-row"><td>三業態合計淨損益</td><td class="num-col" style="color:${totalNet>=0?'#5cb87a':'#e87060'}">${fmt(totalNet)}</td></tr>`;
  tbl.innerHTML = html;
}

// ══════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════
function renderAll() {
  renderSummary();

  ['studio','perf','bonsei'].forEach(e => {
    const calc = calcEntity(e);
    renderStats(e+'Stats', calc.income, calc.expense, calc.net, calc.entries.length);
    renderPL(e+'PL', e, calc);
    renderLedger(e+'Ledger', e, filterTypes[e]);
  });
}

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function filterType(entity, type) {
  filterTypes[entity] = type;
  renderLedger(entity+'Ledger', entity, type);
}

// ══════════════════════════════════════════
// ADD MODAL
// ══════════════════════════════════════════
function openAddModal(entity) {
  currentEntity = entity;
  const m = ENTITY_META[entity];
  document.getElementById('modalTitle').textContent = `新增記錄 — ${m.name}`;

  // Set today's date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('entryDate').value = today;
  document.getElementById('entryAmount').value = '';
  document.getElementById('entryNote').value = '';
  document.querySelector('input[name="entryType"][value="income"]').checked = true;

  updateCategoryOptions();
  document.getElementById('addModal').classList.add('open');
}

function updateCategoryOptions() {
  const type = document.querySelector('input[name="entryType"]:checked').value;
  const cats = getCategories();
  const catList = cats[currentEntity]?.[type] || [];
  const sel = document.getElementById('entryCat');
  sel.innerHTML = catList.map(c => `<option value="${c}">${c}</option>`).join('');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function saveEntry() {
  const type = document.querySelector('input[name="entryType"]:checked').value;
  const date = document.getElementById('entryDate').value;
  const amount = parseFloat(document.getElementById('entryAmount').value);
  const cat = document.getElementById('entryCat').value;
  const note = document.getElementById('entryNote').value.trim();

  if (!date || !amount || amount <= 0) {
    alert('請填入日期和金額');
    return;
  }

  const entry = {
    id: Date.now().toString(),
    date, type, amount, cat, note
  };

  closeModal('addModal');
  showLoading(true);
  try {
    await apiAdd(currentEntity, entry);
    showToast('✓ 記錄已儲存');
    renderAll();
  } catch(e) {
    showToast('⚠ 儲存失敗：' + e.message, 'error');
  }
  showLoading(false);
}

async function deleteEntry(entity, id) {
  if (!confirm('確定要刪除這筆記錄？')) return;
  showLoading(true);
  try {
    await apiDelete(entity, id);
    showToast('✓ 記錄已刪除');
    renderAll();
  } catch(e) {
    showToast('⚠ 刪除失敗：' + e.message, 'error');
  }
  showLoading(false);
}

// ══════════════════════════════════════════
// BATCH MODAL
// ══════════════════════════════════════════
function openBatchModal() {
  const periodStr = currentMonth === 0 ? `${currentYear}年全年` : `${currentYear}年${currentMonth}月`;
  let html = `<p style="font-size:13px;color:var(--muted);margin-bottom:20px">期間：${periodStr}</p>`;
  const cats = getCategories();

  ['studio','perf','bonsei'].forEach(entity => {
    const m = ENTITY_META[entity];
    html += `<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid ${m.color}20">
        <div style="width:8px;height:8px;border-radius:50%;background:${m.color}"></div>
        <strong style="color:${m.color}">${m.name}</strong>
      </div>
      <div class="batch-grid">`;

    (cats[entity]?.income || []).forEach(cat => {
      html += `<div class="batch-item">
        <span class="batch-label"><span style="color:var(--positive);font-size:11px;margin-right:4px">▲</span>${cat}</span>
        <input class="batch-input" type="number" placeholder="0"
          data-entity="${entity}" data-type="income" data-cat="${cat}">
      </div>`;
    });
    (cats[entity]?.expense || []).forEach(cat => {
      html += `<div class="batch-item">
        <span class="batch-label"><span style="color:var(--negative);font-size:11px;margin-right:4px">▼</span>${cat}</span>
        <input class="batch-input" type="number" placeholder="0"
          data-entity="${entity}" data-type="expense" data-cat="${cat}">
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `<div class="form-row">
    <label>備註（套用到所有本次新增的記錄）</label>
    <input type="text" id="batchNote" placeholder="例：2025年3月批次結帳">
  </div>`;

  document.getElementById('batchContent').innerHTML = html;
  document.getElementById('batchModal').classList.add('open');
}

async function saveBatch() {
  const note = document.getElementById('batchNote').value.trim();

  let date;
  if (currentMonth === 0) {
    date = new Date().toISOString().split('T')[0];
  } else {
    const lastDay = new Date(currentYear, currentMonth, 0).getDate();
    date = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  }

  const entries = [];
  document.querySelectorAll('.batch-input').forEach(inp => {
    const val = parseFloat(inp.value);
    if (!val || val <= 0) return;
    entries.push({
      entity: inp.dataset.entity,
      entry: {
        id: Date.now().toString() + Math.random().toString(36).slice(2,6),
        date,
        type: inp.dataset.type,
        amount: val,
        cat: inp.dataset.cat,
        note: note || `${currentYear}年${currentMonth || ''}月批次輸入`
      }
    });
  });

  if (entries.length === 0) { closeModal('batchModal'); return; }

  closeModal('batchModal');
  showLoading(true);
  try {
    await Promise.all(entries.map(({entity, entry}) => apiAdd(entity, entry)));
    showToast(`✓ 已儲存 ${entries.length} 筆記錄`);
    renderAll();
  } catch(e) {
    showToast('⚠ 部分儲存失敗：' + e.message, 'error');
    await loadAllData();
    renderAll();
  }
  showLoading(false);
}

// ══════════════════════════════════════════
// EXPORT EXCEL
// ══════════════════════════════════════════
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const periodStr = currentMonth === 0 ? `${currentYear}年全年` : `${currentYear}年${currentMonth}月`;
  const cats = getCategories();
  const calcs = {
    studio: calcEntity('studio'),
    perf:   calcEntity('perf'),
    bonsei: calcEntity('bonsei')
  };
  const totalIncome  = calcs.studio.income  + calcs.perf.income  + calcs.bonsei.income;
  const totalExpense = calcs.studio.expense + calcs.perf.expense + calcs.bonsei.expense;
  const totalNet     = totalIncome - totalExpense;

  function numFmt(n) { return n.toLocaleString('zh-TW'); }

  // ── 1. 合併總覽 ──
  const summaryRows = [
    ['靈動力肢體開發有限公司　合併損益表', '', '', periodStr],
    [''],
    ['業態', '收入', '支出', '淨損益']
  ];
  ['studio','perf','bonsei'].forEach(e => {
    const m = ENTITY_META[e]; const c = calcs[e];
    summaryRows.push([m.name, numFmt(c.income), numFmt(c.expense), numFmt(c.net)]);
  });
  summaryRows.push(['']);
  summaryRows.push(['三業態合計', numFmt(totalIncome), numFmt(totalExpense), numFmt(totalNet)]);

  const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols'] = [{wch:22},{wch:16},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsSummary, '合併總覽');

  // ── 2. 各業態損益表 ──
  ['studio','perf','bonsei'].forEach(entity => {
    const m = ENTITY_META[entity];
    const c = calcs[entity];
    const entityCats = cats[entity] || { income:[], expense:[] };
    const rows = [
      [m.name + '　損益表', periodStr],
      [''],
      ['▲ 收入', '金額']
    ];
    entityCats.income.forEach(cat => {
      rows.push(['　' + cat, numFmt(c.incByCat[cat]||0)]);
    });
    Object.entries(c.incByCat).forEach(([cat, val]) => {
      if (!entityCats.income.includes(cat) && val > 0)
        rows.push(['　' + cat + '（已移除科目）', numFmt(val)]);
    });
    rows.push(['收入合計', numFmt(c.income)]);
    rows.push(['']);
    rows.push(['▼ 支出', '金額']);
    entityCats.expense.forEach(cat => {
      rows.push(['　' + cat, numFmt(c.expByCat[cat]||0)]);
    });
    Object.entries(c.expByCat).forEach(([cat, val]) => {
      if (!entityCats.expense.includes(cat) && val > 0)
        rows.push(['　' + cat + '（已移除科目）', numFmt(val)]);
    });
    rows.push(['支出合計', numFmt(c.expense)]);
    rows.push(['']);
    rows.push(['淨損益', numFmt(c.net)]);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:26},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, m.name + '_損益');
  });

  // ── 3. 各業態收支明細 ──
  ['studio','perf','bonsei'].forEach(entity => {
    const m = ENTITY_META[entity];
    const data = getData();
    const entries = filterByPeriod(data[entity]||[]).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const rows = [['日期', '類型', '類別', '金額', '備註']];
    entries.forEach(e => {
      const isInc = e.type === 'income';
      rows.push([
        e.date,
        isInc ? '收入' : '支出',
        e.cat,
        numFmt(isInc ? e.amount : -e.amount),
        e.note || ''
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:6},{wch:20},{wch:14},{wch:32}];
    XLSX.utils.book_append_sheet(wb, ws, m.name + '_明細');
  });

  XLSX.writeFile(wb, `靈動力財務_${periodStr}.xlsx`);
}

// ══════════════════════════════════════════
// CATEGORY MANAGER
// ══════════════════════════════════════════
function renderCatManager() {
  const cats = getCategories();
  const body = document.getElementById('catManagerBody');
  if (!body) return;

  const makeCatItem = (entity, type, c, i) => `
    <div class="cat-list-item" id="catitem_${entity}_${type}_${i}">
      <span class="cat-item-label">${c}</span>
      <div style="display:flex;gap:4px">
        <button class="cat-del" onclick="startEditCat('${entity}','${type}',${i})" title="修改" style="color:var(--muted)">✎</button>
        <button class="cat-del" onclick="deleteCat('${entity}','${type}',${i})" title="刪除">✕</button>
      </div>
    </div>`;

  body.innerHTML = ['studio','perf','bonsei'].map(entity => {
    const m = ENTITY_META[entity];
    const incList = (cats[entity]?.income || []).map((c,i) => makeCatItem(entity,'income',c,i)).join('');
    const expList = (cats[entity]?.expense || []).map((c,i) => makeCatItem(entity,'expense',c,i)).join('');

    return `
      <div class="cat-manager-entity">
        <div class="cat-manager-entity-title">
          <div style="width:10px;height:10px;border-radius:50%;background:${m.color}"></div>
          ${m.name}
        </div>
        <div class="cat-columns">
          <div>
            <div class="cat-col-title" style="color:var(--positive)">▲ 收入科目</div>
            <div class="cat-list">${incList || '<div style="font-size:12px;color:var(--muted);padding:6px 0">尚無科目</div>'}</div>
            <div class="cat-add-row">
              <input type="text" id="newInc_${entity}" placeholder="新增收入科目..." onkeydown="if(event.key==='Enter')addCat('${entity}','income')">
              <button class="cat-add-btn" onclick="addCat('${entity}','income')">新增</button>
            </div>
          </div>
          <div>
            <div class="cat-col-title" style="color:var(--negative)">▼ 支出科目</div>
            <div class="cat-list">${expList || '<div style="font-size:12px;color:var(--muted);padding:6px 0">尚無科目</div>'}</div>
            <div class="cat-add-row">
              <input type="text" id="newExp_${entity}" placeholder="新增支出科目..." onkeydown="if(event.key==='Enter')addCat('${entity}','expense')">
              <button class="cat-add-btn" onclick="addCat('${entity}','expense')">新增</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:4px 0 24px">');
}

async function addCat(entity, type) {
  const inputId = type === 'income' ? `newInc_${entity}` : `newExp_${entity}`;
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;

  const cats = getCategories();
  if (!cats[entity]) cats[entity] = { income: [], expense: [] };
  if (cats[entity][type].includes(val)) {
    alert('這個科目已經存在！');
    return;
  }
  cats[entity][type].push(val);
  input.value = '';
  showLoading(true);
  await saveCategoriesToSheet(cats);
  CATEGORIES = _catCache;
  showLoading(false);
  renderCatManager();
  showToast('✓ 科目已儲存');
}

async function deleteCat(entity, type, idx) {
  const cats = getCategories();
  const catName = cats[entity][type][idx];
  if (!confirm(`確定刪除「${catName}」？\n\n已有這個科目的記錄不會消失，但科目名稱會標示為「已移除」。`)) return;
  cats[entity][type].splice(idx, 1);
  showLoading(true);
  await saveCategoriesToSheet(cats);
  CATEGORIES = _catCache;
  showLoading(false);
  renderCatManager();
  renderAll();
  showToast('✓ 科目已刪除');
}

function startEditCat(entity, type, idx) {
  const cats = getCategories();
  const oldName = cats[entity][type][idx];
  const itemEl = document.getElementById(`catitem_${entity}_${type}_${idx}`);
  if (!itemEl) return;

  itemEl.innerHTML = `
    <input type="text" value="${oldName}" id="editInput_${entity}_${type}_${idx}"
      style="flex:1;padding:4px 8px;border:1px solid var(--accent);border-radius:4px;font-size:13px;"
      onkeydown="if(event.key==='Enter')renameCat('${entity}','${type}',${idx});if(event.key==='Escape')renderCatManager()">
    <div style="display:flex;gap:4px">
      <button class="cat-add-btn" style="padding:4px 10px" onclick="renameCat('${entity}','${type}',${idx})">確認</button>
      <button class="cat-del" onclick="renderCatManager()" style="color:var(--muted)">✕</button>
    </div>
  `;
  document.getElementById(`editInput_${entity}_${type}_${idx}`)?.focus();
}

async function renameCat(entity, type, idx) {
  const input = document.getElementById(`editInput_${entity}_${type}_${idx}`);
  const newName = input?.value.trim();
  if (!newName) return;

  const cats = getCategories();
  const oldName = cats[entity][type][idx];
  if (newName === oldName) { renderCatManager(); return; }
  if (cats[entity][type].includes(newName)) {
    alert('這個科目名稱已經存在！');
    return;
  }

  // 更新科目名稱
  cats[entity][type][idx] = newName;

  // 同步更新已有記錄的科目名稱
  const data = getData();
  (data[entity] || []).forEach(e => {
    if (e.cat === oldName) e.cat = newName;
  });

  showLoading(true);
  await saveCategoriesToSheet(cats);
  CATEGORIES = _catCache;
  showLoading(false);
  renderCatManager();
  renderAll();
  showToast(`✓ 已將「${oldName}」改為「${newName}」`);
}

loadAllData().then(() => renderAll());
