<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DanceSoul 財務系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --accent-studio: #c8f542;   /* 教室 - 螢光黃綠 */
    --accent-case: #42c8f5;     /* CASE - 電藍 */
    --accent-bense: #f542a8;    /* 本勢 - 玫瑰粉 */
    --accent: var(--accent-studio);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --income-color: #4ade80;
    --expense-color: #f87171;
    --radius: 8px;
    --font: 'Noto Sans TC', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .unit-tabs {
    display: flex;
    gap: 4px;
  }

  .unit-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .unit-tab.active[data-unit="STUDIO"] { background: var(--accent-studio); color: #000; border-color: var(--accent-studio); }
  .unit-tab.active[data-unit="CASE"]   { background: var(--accent-case);   color: #000; border-color: var(--accent-case); }
  .unit-tab.active[data-unit="BENSE"]  { background: var(--accent-bense);  color: #fff; border-color: var(--accent-bense); }
  .unit-tab:hover:not(.active) { border-color: #444; color: var(--text); }

  .api-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
  }
  .status-dot.ok  { background: var(--income-color); }
  .status-dot.err { background: var(--expense-color); }

  /* ── NAV ── */
  .nav {
    display: flex;
    gap: 0;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .nav-btn {
    padding: 12px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── LAYOUT ── */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 16px;
    font-family: var(--mono);
  }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .summary-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }

  .summary-label {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 8px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
  }

  .summary-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
  }

  .summary-value.income  { color: var(--income-color); }
  .summary-value.expense { color: var(--expense-color); }
  .summary-value.net     { color: var(--accent); }

  /* ── MONTH PICKER ── */
  .month-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .month-row label { font-size: 13px; color: var(--text2); }

  .month-row input[type=month] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: #555; background: #2a2a2a; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-danger { color: var(--expense-color); border-color: #3a1c1c; }
  .btn-danger:hover { background: #2a1111; border-color: var(--expense-color); }

  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── BATCH INPUT ── */
  .batch-header {
    display: grid;
    grid-template-columns: 130px 110px 150px 1fr 110px 100px 90px 36px;
    gap: 10px;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .batch-header span {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  .batch-rows { display: flex; flex-direction: column; gap: 6px; }

  .batch-row {
    display: grid;
    grid-template-columns: 130px 110px 150px 1fr 110px 100px 90px 36px;
    gap: 10px;
    align-items: center;
  }

  .batch-row input,
  .batch-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-family: var(--font);
    font-size: 13px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .batch-row input:focus,
  .batch-row select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .batch-row select option { background: #222; }

  .del-row-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .del-row-btn:hover { color: var(--expense-color); border-color: #3a1c1c; background: #1a0a0a; }

  .batch-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    align-items: center;
  }

  .type-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    width: fit-content;
  }

  .type-btn {
    padding: 8px 24px;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .type-btn.active.income  { background: var(--income-color);  color: #000; }
  .type-btn.active.expense { background: var(--expense-color); color: #000; }

  /* ── TABLE ── */
  .tbl-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 10px 12px;
    color: var(--text);
    vertical-align: middle;
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
  }

  .amount-income  { color: var(--income-color);  font-family: var(--mono); }
  .amount-expense { color: var(--expense-color); font-family: var(--mono); }

  /* ── P&L TABLE ── */
  .pl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .pl-section-title {
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    padding: 8px 0;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .pl-section-title.income  { color: var(--income-color); }
  .pl-section-title.expense { color: var(--expense-color); }

  .pl-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 13px;
  }

  .pl-row .pl-cat { color: var(--text2); }
  .pl-row .pl-val { font-family: var(--mono); color: var(--text); }

  .pl-total {
    display: flex;
    justify-content: space-between;
    padding: 10px 0 0;
    margin-top: 6px;
    font-weight: 700;
    font-size: 14px;
  }

  .pl-total.income  .pl-val { color: var(--income-color); }
  .pl-total.expense .pl-val { color: var(--expense-color); }

  .pl-net-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pl-net-label { font-size: 13px; color: var(--text2); font-family: var(--mono); }
  .pl-net-value { font-family: var(--mono); font-size: 24px; font-weight: 700; }
  .pl-net-value.pos { color: var(--income-color); }
  .pl-net-value.neg { color: var(--expense-color); }

  /* ── SETTINGS ── */
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .cat-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
    max-height: 300px;
    overflow-y: auto;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
  }

  .cat-item span { flex: 1; font-size: 13px; }

  .cat-item .del-cat {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 14px; line-height: 1;
    padding: 2px 4px; border-radius: 4px;
    transition: color 0.15s;
  }

  .cat-item .del-cat:hover { color: var(--expense-color); }

  .add-cat-row {
    display: flex;
    gap: 8px;
  }

  .add-cat-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    font-family: var(--font);
  }

  .add-cat-row input:focus { outline: none; border-color: var(--accent); }

  /* ── ALL UNITS SUMMARY ── */
  .all-summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .unit-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .unit-card-name {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .unit-card-name[data-unit="STUDIO"] { color: var(--accent-studio); }
  .unit-card-name[data-unit="CASE"]   { color: var(--accent-case); }
  .unit-card-name[data-unit="BENSE"]  { color: var(--accent-bense); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--income-color); }
  #toast.err  { border-color: var(--expense-color); }

  /* ── 列印樣式 ── */
  @media print {
    body { background: #fff; color: #000; }
    .topbar, .nav, #toast, .modal-overlay { display: none !important; }
    .main { padding: 0; max-width: 100%; }
    .card { border: none; box-shadow: none; padding: 0; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    #printArea {
      font-family: 'Noto Sans TC', sans-serif;
      color: #000;
      padding: 24px;
    }
  }

  .print-only { display: none; }

  #printArea table { width: 100%; border-collapse: collapse; }
  #printArea th, #printArea td {
    border: 1px solid #ccc;
    padding: 6px 10px;
    font-size: 13px;
  }
  #printArea th { background: #f5f5f5; font-weight: 600; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 13px;
    gap: 10px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 40px; color: var(--text3); font-family: var(--mono); font-size: 13px; }

  /* ── PAGINATION ── */
  .pagination {
    display: flex; gap: 6px; align-items: center;
    justify-content: flex-end; margin-top: 12px;
  }

  .page-info { font-size: 12px; color: var(--text2); font-family: var(--mono); }

  /* ── EDIT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 480px;
    max-width: 95vw;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }

  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: block; font-family: var(--mono); }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-family: var(--font);
    font-size: 13px;
  }

  .form-input:focus { outline: none; border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">DanceSoul · 財務系統</div>
  <div class="unit-tabs">
    <button class="unit-tab active" data-unit="STUDIO" onclick="switchUnit('STUDIO')">舞蹈教室</button>
    <button class="unit-tab" data-unit="CASE" onclick="switchUnit('CASE')">CASE</button>
    <button class="unit-tab" data-unit="BENSE" onclick="switchUnit('BENSE')">本勢娛樂</button>
  </div>
  <div class="api-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">未連線</span>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showPage('entry')">記帳</button>
  <button class="nav-btn" onclick="showPage('ledger')">明細</button>
  <button class="nav-btn" onclick="showPage('pl')">損益表</button>
  <button class="nav-btn" onclick="showPage('yearly')">年度報表</button>
  <button class="nav-btn" onclick="showPage('trend')">趨勢圖</button>
  <button class="nav-btn" onclick="showPage('requisition')">請款單</button>
  <button class="nav-btn" onclick="showPage('receivables')">應收應付</button>
  <button class="nav-btn" onclick="showPage('hr')">HR</button>
  <button class="nav-btn" onclick="showPage('all')">總覽</button>
  <button class="nav-btn" onclick="showPage('accounts')">帳戶</button>
  <button class="nav-btn" onclick="showPage('settings')">設定</button>
</div>

<div class="main" id="main"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">編輯記錄</div>
    <div class="form-row">
      <label class="form-label">付款日期</label>
      <input class="form-input" type="date" id="editDate">
    </div>
    <div class="form-row">
      <label class="form-label">歸屬月份（損益表用）</label>
      <input class="form-input" type="month" id="editBelongMonth">
    </div>
    <div class="form-row">
      <label class="form-label">類別</label>
      <select class="form-input" id="editCategory"></select>
    </div>
    <div class="form-row">
      <label class="form-label">說明</label>
      <input class="form-input" type="text" id="editDesc">
    </div>
    <div class="form-row">
      <label class="form-label">金額</label>
      <input class="form-input" type="number" id="editAmount">
    </div>
    <div class="form-row">
      <label class="form-label">帳戶</label>
      <select class="form-input" id="editAccount"></select>
    </div>
    <div class="form-row">
      <label class="form-label">備註</label>
      <input class="form-input" type="text" id="editNote">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxLoM7i7RNtOWBmLg2TKskN2stdhMTluYd3ct41GEEIXXnLjJmse6fb9ymfPA7DsvX3/exec';

const UNIT_NAMES = { STUDIO: '舞蹈教室', CASE: 'CASE（肢體/藝能）', BENSE: '本勢娛樂' };
const UNIT_ACCENT = { STUDIO: '#c8f542', CASE: '#42c8f5', BENSE: '#f542a8' };

let currentUnit = 'STUDIO';
let currentPage = 'entry';
let currentType = 'income'; // for entry/ledger
let categories = { STUDIO: { income: [], expense: [] }, CASE: { income: [], expense: [] }, BENSE: { income: [], expense: [] } };
let accounts = [];
let currentYear, currentMonth;
let editingRecord = null;
let ledgerPage = 1;
const PAGE_SIZE = 30;

// ============================================================
// INIT
// ============================================================
window.onload = async () => {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;

  updateAccent();
  showPage('entry');

  if (!API_URL) {
    setStatus('err', '請設定 API_URL');
    return;
  }
  await loadAll();
};

async function loadAll() {
  setStatus('', '連線中...');
  try {
    await Promise.all([loadCategories(), loadAccounts()]);
    setStatus('ok', '已連線');
  } catch (e) {
    setStatus('err', '連線失敗');
  }
}

async function loadCategories() {
  const res = await api({ action: 'getCategories' });
  if (res.success) categories = res.data;
}

async function loadAccounts() {
  const res = await api({ action: 'getAccounts' });
  if (res.success) accounts = res.data;
}

// ============================================================
// API
// ============================================================
async function api(body) {
  if (!API_URL) return { success: false, message: '未設定 API_URL' };
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });

  main.innerHTML = `

        <button class="type-btn ${currentType==='expense'?'active expense':''}" onclick="setEntryType('expense')">支出</button>
      </div>
      <div class="batch-header">
        <span>付款日期</span><span>歸屬月份</span><span>類別</span><span>說明</span><span>金額</span><span>帳戶</span><span>備註</span><span></span>
      </div>
      <div class="batch-rows" id="batchRows"></div>
      <div class="batch-actions">
        <button class="btn" onclick="addBatchRow()">＋ 新增一列</button>
        <button class="btn" onclick="copyFromLastMonth()" ${currentType==='expense'?'':'style="display:none"'}>複製上個月支出</button>
        <button class="btn btn-primary" onclick="submitBatch()">批次儲存</button>
        <span id="batchMsg" style="font-size:12px;color:var(--text2);margin-left:8px;"></span>
      </div>
    </div>
  `;

  // 預設3列
  for (let i = 0; i < 3; i++) addBatchRow();
}

function setEntryType(type) {
  currentType = type;
  renderEntry();
}

function addBatchRow() {
  const rows = document.getElementById('batchRows');
  const today = new Date().toISOString().split('T')[0];
  const thisMonth = today.substring(0, 7);
  const cats = categories[currentUnit][currentType] || [];
  const catOptions = cats.map(c => `<option>${c}</option>`).join('');
  const accOptions = accounts.map(a => `<option>${a.name}</option>`).join('');

  const row = document.createElement('div');
  row.className = 'batch-row';
  row.innerHTML = `
    <input type="date" value="${today}" oninput="syncBelongMonth(this)">
    <input type="month" value="${thisMonth}" style="font-size:12px">
    <select>${catOptions}</select>
    <input type="text" placeholder="說明">
    <input type="number" placeholder="0" min="0">
    <select>${accOptions}</select>
    <input type="text" placeholder="備註">
    <button class="del-row-btn" onclick="this.parentElement.remove()">×</button>
  `;
  rows.appendChild(row);

  // 金額欄按 Enter 自動新增下一列
  const amountInput = row.querySelectorAll('input')[3];
  amountInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { addBatchRow(); }
  });
}

// 付款日期變動時自動同步歸屬月份
function syncBelongMonth(dateInput) {
  const row = dateInput.parentElement;
  const monthInput = row.querySelectorAll('input')[1];
  if (dateInput.value) {
    monthInput.value = dateInput.value.substring(0, 7);
  }
}

async function submitBatch() {
  const rows = document.querySelectorAll('#batchRows .batch-row');
  const records = [];

  rows.forEach(row => {
    const inputs = row.querySelectorAll('input, select');
    const date        = inputs[0].value;
    const belongMonth = inputs[1].value; // type="month"
    const category    = inputs[2].value;
    const description = inputs[3].value;
    const amount      = parseFloat(inputs[4].value);
    const account     = inputs[5].value;
    const note        = inputs[6].value;

    if (!date || !category || !amount || isNaN(amount) || amount <= 0) return;

    records.push({ unit: currentUnit, type: currentType, date, belongMonth, category, description, amount, account, note });
  });

  if (records.length === 0) { toast('沒有可儲存的資料（請檢查日期、類別、金額）', 'err'); return; }

  document.getElementById('batchMsg').textContent = '儲存中...';

  try {
    const res = await api({ action: 'addRecords', records });
    if (res.success) {
      toast(`已儲存 ${res.ids.length} 筆`, 'ok');
      document.getElementById('batchMsg').textContent = '';
      renderEntry();
    } else {
      toast(res.message, 'err');
      document.getElementById('batchMsg').textContent = '';
    }
  } catch (e) {
    toast('儲存失敗：' + e.message, 'err');
    document.getElementById('batchMsg').textContent = '';
  }
}

// ============================================================
// 複製上個月支出
// ============================================================
async function copyFromLastMonth() {
  const now = new Date();
  let y = currentYear, m = currentMonth;
  // 如果沒有選月份就用當月
  document.getElementById('batchMsg').textContent = '載入中...';

  try {
    const res = await api({ action: 'copyLastMonth', unit: currentUnit, year: y, month: m });
    if (!res.success) { toast(res.message, 'err'); document.getElementById('batchMsg').textContent = ''; return; }

    // 清空現有列，填入複製的資料
    document.getElementById('batchRows').innerHTML = '';
    res.data.forEach(r => {
      addBatchRow();
      const rows = document.querySelectorAll('#batchRows .batch-row');
      const row = rows[rows.length - 1];
      const inputs = row.querySelectorAll('input, select');
      inputs[0].value = r.date;
      // 設定類別
      Array.from(inputs[1].options).forEach(o => { if (o.value === r.category) o.selected = true; });
      inputs[2].value = r.description || '';
      inputs[3].value = r.amount;
      Array.from(inputs[4].options).forEach(o => { if (o.value === r.account) o.selected = true; });
      inputs[5].value = r.note || '';
    });

    document.getElementById('batchMsg').textContent = '';
    toast(`已載入上個月 ${res.data.length} 筆支出，確認後按「批次儲存」`, 'ok');
  } catch (e) {
    toast('載入失敗：' + e.message, 'err');
    document.getElementById('batchMsg').textContent = '';
  }
}

// ============================================================
// CSV 匯出
// ============================================================
async function exportCSV() {
  const ym = `${currentYear}年${currentMonth}月`;
  toast('準備匯出...', '');
  try {
    const res = await api({ action: 'exportCSV', unit: currentUnit, year: currentYear, month: currentMonth });
    if (!res.success) { toast(res.message, 'err'); return; }

    // 加 BOM 讓 Excel 正確開啟中文
    const bom = '\uFEFF';
    const blob = new Blob([bom + res.data], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `DanceSoul_${UNIT_NAMES[currentUnit]}_${ym}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`已匯出 ${ym} CSV`, 'ok');
  } catch (e) {
    toast('匯出失敗：' + e.message, 'err');
  }
}

async function loadLedger() {
  const content = document.getElementById('ledgerContent');
  if (!content) return;

  try {
    const res = await api({ action: 'getRecords', unit: currentUnit, type: currentType, year: currentYear, month: currentMonth });
    if (!res.success) { content.innerHTML = `<div class="empty">${res.message}</div>`; return; }

    const records = res.data;
    if (records.length === 0) { content.innerHTML = '<div class="empty">這個月份沒有資料</div>'; return; }

    const totalPages = Math.ceil(records.length / PAGE_SIZE);
    const pageRecords = records.slice((ledgerPage - 1) * PAGE_SIZE, ledgerPage * PAGE_SIZE);
    const totalAmount = records.reduce((s, r) => s + Number(r.amount), 0);

    const typeClass = currentType === 'income' ? 'amount-income' : 'amount-expense';

    content.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:12px;color:var(--text2)">共 <b style="color:var(--text)">${records.length}</b> 筆</div>
        <div style="font-family:var(--mono);font-size:14px" class="${typeClass}">合計：${fmt(totalAmount)}</div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>類別</th><th>說明</th><th>帳戶</th><th style="text-align:right">金額</th><th>備註</th><th></th>
          </tr></thead>
          <tbody>
            ${pageRecords.map(r => `
              <tr>
                <td style="font-family:var(--mono);white-space:nowrap">${r.date}</td>
                <td><span class="tag">${r.category}</span></td>
                <td>${r.description || ''}</td>
                <td style="color:var(--text2)">${r.account || ''}</td>
                <td class="${typeClass}" style="text-align:right;font-family:var(--mono)">${fmt(r.amount)}</td>
                <td style="color:var(--text2)">${r.note || ''}</td>
                <td style="white-space:nowrap">
                  <button class="btn btn-sm" onclick="openEdit('${r.id}','${currentType}',${JSON.stringify(r).replace(/"/g,'&quot;')})">編輯</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteRec('${r.id}','${currentType}')">刪除</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${totalPages > 1 ? `
        <div class="pagination">
          <button class="btn btn-sm" onclick="ledgerPage--; loadLedger()" ${ledgerPage===1?'disabled':''}>上一頁</button>
          <span class="page-info">${ledgerPage} / ${totalPages}</span>
          <button class="btn btn-sm" onclick="ledgerPage++; loadLedger()" ${ledgerPage===totalPages?'disabled':''}>下一頁</button>
        </div>
      ` : ''}
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

function openEdit(id, type, record) {

  document.getElementById('editDate').value = record.date;

  document.getElementById('editDesc').value = record.description || '';

  const catSel = document.getElementById('editCategory');

  catSel.innerHTML = cats.map(c => `<option ${c===record.category?'selected':''}>${c}</option>`).join('');

  const accSel = document.getElementById('editAccount');

async function saveEdit() {
  const updated = {
    ...editingRecord,
    date: document.getElementById('editDate').value,
    belongMonth: document.getElementById('editBelongMonth').value,

    account: document.getElementById('editAccount').value,
    note: document.getElementById('editNote').value,

  else toast(res.message, 'err');
}

function calcAnnualLeave(startDate) {
  // 台灣勞基法特休計算
  const start = new Date(startDate);
  const now = new Date();
  const diffMs = now - start;
  const diffDays = diffMs / (1000*60*60*24);
  const months = diffDays / 30.44;
  const years = diffDays / 365.25;

  if (months < 6) return 0;
  if (years < 1)  return 3;
  if (years < 2)  return 7;
  if (years < 3)  return 10;
  if (years < 5)  return 14;
  if (years < 10) return 15;
  return Math.min(15 + Math.floor(years - 10) + 1, 30);
}

function calcSeniority(startDate) {
  const start = new Date(startDate);
  const now = new Date();
  const diffMs = now - start;
  const years = Math.floor(diffMs / (365.25*24*60*60*1000));
  const months = Math.floor((diffMs % (365.25*24*60*60*1000)) / (30.44*24*60*60*1000));
  return `${years}年${months}個月`;
}

                <td style="font-size:12px;color:var(--text2)">${seniority}</td>

function openEmpModal(emp) {
  editingEmp = emp || null;
  document.getElementById('empModalTitle').textContent = emp ? '編輯員工' : '新增員工';
  document.getElementById('empName').value = emp?.name || '';
  document.getElementById('empTitle').value = emp?.title || '';
  document.getElementById('empUnit').value = emp?.unit || 'STUDIO';
  document.getElementById('empStart').value = emp?.startDate || '';
  document.getElementById('empSalaryType').value = emp?.salaryType || '月薪';
  document.getElementById('empSalaryAmt').value = emp?.salaryAmount || '';
  document.getElementById('empNote').value = emp?.note || '';
  document.getElementById('empModal').classList.add('show');
}

function closeEmpModal() {
  document.getElementById('empModal').classList.remove('show');
  editingEmp = null;
}

async function saveEmployee() {
  const emp = {
    id: editingEmp?.id,
    name: document.getElementById('empName').value,
    title: document.getElementById('empTitle').value,
    unit: document.getElementById('empUnit').value,
    startDate: document.getElementById('empStart').value,
    salaryType: document.getElementById('empSalaryType').value,
    salaryAmount: parseFloat(document.getElementById('empSalaryAmt').value) || 0,
    note: document.getElementById('empNote').value
  };
  if (!emp.name || !emp.startDate) { toast('姓名和到職日必填', 'err'); return; }
  const res = await api({ action: 'saveEmployee', employee: emp });
  if (res.success) { toast('已儲存', 'ok'); closeEmpModal(); loadHR(); }
  else toast(res.message, 'err');
}

async function deleteEmp(id) {
  if (!confirm('確定刪除這位員工？')) return;
  const res = await api({ action: 'deleteEmployee', id });
  if (res.success) { toast('已刪除', 'ok'); loadHR(); }
  else toast(res.message, 'err');
}

let currentReqFilter = '';
let approvingReqId = null;

async function loadRequisitions(status) {
  currentReqFilter = status;
  ['all','pending','paid'].forEach(k => {
    const el = document.getElementById(`rqtab-${k}`);
    if (!el) return;
    el.classList.remove('active','income','expense');
  });
  const tabMap = {'':'all','待核准':'pending','已付款':'paid'};
  const activeTab = document.getElementById(`rqtab-${tabMap[status]}`);
  if (activeTab) { activeTab.classList.add('active','income'); }

  const content = document.getElementById('reqContent');
  if (!content) return;
  content.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';

  try {
    const res = await api({ action: 'getRequisitions', unit: '', status });
    if (!res.success) { content.innerHTML = `<div class="empty">${res.message}</div>`; return; }
    const reqs = res.data;
    if (reqs.length === 0) { content.innerHTML = '<div class="empty">沒有請款單</div>'; return; }

    content.innerHTML = `
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>單號</th><th>日期</th><th>單位</th><th>請款人</th><th>說明</th>
            <th style="text-align:right">金額</th><th>狀態</th><th>付款日</th><th></th>
          </tr></thead>
          <tbody>
            ${reqs.map(r => {
              const total = (r.items||[]).reduce((s,i)=>s+Number(i.amount),0);
              const statusColor = r.status==='已付款'?'var(--text3)':r.status==='待核准'?'var(--accent)':'var(--text2)';
              const unitName = UNIT_NAMES[r.unit]||r.unit;
              const unitColor = UNIT_ACCENT[r.unit]||'var(--text)';
              return `<tr>
                <td style="font-family:var(--mono);font-size:12px">${r.id}</td>
                <td style="font-family:var(--mono);font-size:12px">${r.date}</td>
                <td><span style="font-size:11px;color:${unitColor}">${unitName}</span></td>
                <td>${r.applicant}</td>
                <td style="color:var(--text2)">${r.description}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--expense-color)">${fmt(total)}</td>
                <td><span style="font-size:12px;color:${statusColor};font-weight:500">${r.status}</span></td>
                <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${r.payDate||'—'}</td>
                <td style="white-space:nowrap;display:flex;gap:4px">
                  <button class="btn btn-sm" onclick="printReq('${r.id}')">列印</button>
                  ${r.status==='待核准'?`
                    <button class="btn btn-sm" onclick='openEditReq(${JSON.stringify(r).replace(/'/g,"&#39;")})'>編輯</button>
                    <button class="btn btn-sm btn-primary" onclick="openApproveModal('${r.id}')">核准付款</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteReq('${r.id}')">刪除</button>
                  `:''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) {
    content.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

function openReqModal(req) {
  editingReq = req || null;
  reqItems = req ? JSON.parse(JSON.stringify(req.items||[])) : [];
  const today = new Date().toISOString().split('T')[0];
  const thisMonth = today.substring(0,7);

  document.getElementById('reqModalTitle').textContent = req ? `編輯 ${req.id}` : '新增請款單';
  document.getElementById('reqDate').value = req?.date || today;
  document.getElementById('reqBelongMonth').value = req?.belongMonth || thisMonth;
  document.getElementById('reqUnit').value = req?.unit || currentUnit;
  document.getElementById('reqApplicant').value = req?.applicant || '';
  document.getElementById('reqDesc').value = req?.description || '';
  document.getElementById('reqAttachment').value = req?.attachment || '';

  const accSel = document.getElementById('reqAccount');
  accSel.innerHTML = accounts.map(a=>`<option ${a.name===req?.account?'selected':''}>${a.name}</option>`).join('');

  renderReqItems();
  document.getElementById('reqModal').classList.add('show');
}

function openEditReq(req) { openReqModal(req); }

function closeReqModal() {
  document.getElementById('reqModal').classList.remove('show');
  editingReq = null; reqItems = [];
}

function addReqItem() {
  const unit = document.getElementById('reqUnit')?.value || currentUnit;
  reqItems.push({ category: (categories[unit]?.expense||['其他'])[0], description: '', amount: 0 });
  renderReqItems();
}

function renderReqItems() {
  const unit = document.getElementById('reqUnit')?.value || currentUnit;
  const cats = categories[unit]?.expense || ['其他'];
  const container = document.getElementById('reqItems');
  if (!container) return;

  container.innerHTML = reqItems.map((item, i) => `
    <div style="display:grid;grid-template-columns:150px 1fr 100px 32px;gap:6px;margin-bottom:6px;align-items:center">
      <select onchange="reqItems[${i}].category=this.value" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px">
        ${cats.map(c=>`<option ${c===item.category?'selected':''}>${c}</option>`).join('')}
      </select>
      <input type="text" value="${item.description}" placeholder="說明"
        oninput="reqItems[${i}].description=this.value"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px">
      <input type="number" value="${item.amount||''}" placeholder="0"
        oninput="reqItems[${i}].amount=parseFloat(this.value)||0;updateReqTotal()"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px">
      <button onclick="reqItems.splice(${i},1);renderReqItems()" class="del-row-btn">×</button>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">尚無項目，請按「新增項目」</div>';

  updateReqTotal();
}

function updateReqTotal() {
  const total = reqItems.reduce((s,i)=>s+Number(i.amount||0),0);
  const el = document.getElementById('reqTotal');
  if (el) el.textContent = fmt(total);
}

async function saveRequisition() {
  const req = {
    id: editingReq?.id,
    date: document.getElementById('reqDate').value,
    belongMonth: document.getElementById('reqBelongMonth').value,
    unit: document.getElementById('reqUnit').value,
    applicant: document.getElementById('reqApplicant').value,
    description: document.getElementById('reqDesc').value,
    items: reqItems,
    attachment: document.getElementById('reqAttachment').value,
    account: document.getElementById('reqAccount').value
  };

  if (!req.date || !req.applicant || !req.description) { toast('日期、請款人、說明為必填', 'err'); return; }
  if (reqItems.length === 0) { toast('請新增至少一筆費用明細', 'err'); return; }

  const action = editingReq ? 'updateRequisition' : 'addRequisition';
  const res = await api({ action, req });
  if (res.success) {
    toast(editingReq ? '已更新' : `已建立 ${res.id}`, 'ok');
    closeReqModal();
    loadRequisitions(currentReqFilter);
  } else toast(res.message, 'err');
}

async function deleteReq(id) {
  if (!confirm(`確定刪除請款單 ${id}？`)) return;
  const res = await api({ action: 'deleteRequisition', id });
  if (res.success) { toast('已刪除', 'ok'); loadRequisitions(currentReqFilter); }
  else toast(res.message, 'err');
}

  approvingReqId = id;

}
